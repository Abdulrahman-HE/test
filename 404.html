<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
    <script>
        // GitHub Pages SPA routing
        const path = window.location.pathname;
        
        if (path === '/' || path === '') {
            // Root domain - show deck PDF
            window.location.replace('/index.html');
        } else if (path === '/pilot' || path === '/pilot/') {
            // /pilot route - show pilot PDF
            window.location.replace('/pilot.html');
        } else {
            // 404 - redirect to home
            window.location.replace('/index.html');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
